<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>video-audio</title>
  </head>
  <body>
    <video
      src="../img/1.mp4"
      controls
      autoplay
      loop
      width="600px"
      height="500px"
    ></video>

    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/CABRnIbKrz4?si=XXHN7tbihR3XyQhR"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>

    <audio src="../img/2.mp3" controls autoplay></audio>
  </body>
</html>
