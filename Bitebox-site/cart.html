<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart</title>
    <script
      src="https://kit.fontawesome.com/635fbb3959.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="./index.css" />
    <link rel="stylesheet" href="./cart.css">
    <style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Playwrite+GB+S+Guides:ital@0;1&display=swap');
</style>
  </head>
<body>
    <!-- <h3> This is cart page.</h3> -->
  <header>
      <nav>
        <div class="logo">
          <!-- logo -->
          <!-- <h2>bite <span style="color: red">box</span></h2> -->
          <img src="../img/bitebox2.png" width="150px" alt="">
        </div>
        <!-- menu -->
        <ul>
          <li><a href="./index.html" target="_blank">Home</a></li>
          <li><a href="./menu.html" target="_self">Menu</a></li>
          <li><a href="./bitedeals.html">Bitedeals</a></li>
          <li>
            <a href="./cart.html"
              ><i class="fa-solid fa-cart-arrow-down"></i
            >Cart</a>
          </li>
          <li><a href="./login.html"><button id="login-button" ><i class="fa-solid fa-right-to-bracket"></i>
              Login</button></a>
          </li>
        </ul>
      </nav>
    </header>
    <!-- <h3>This is your cart page</h3> -->
    <!-- cart table -->
     <section class="cart">

      <table>
        <thead>
          <th>Item</th>
          <th>Price</th>
          <th>Qty</th>
          <th>Total</th>
          <th>Remove</th>
        </thead>
        <tbody>
          <tr>
            <td class="item">
              <img src="../img/burger.jpg" alt="">
              <div>
                <h4>Cheesy Burger</h4>
                <p>Cheesy Grilled Burger</p>
              </div>
            </td>
            <td>₹199</td>
            <td>
              <div class="qty-box">
                <button>-</button>
                <span>1</span>
                <button>+</button>
              </div>
            </td>
            <td>₹199</td>
            <td><button class="remove">X</button></td>
          </tr>
          <tr>
            <!-- pizza -->
            <td class="item">
              <img src="../img/pizza capsicum.jpg" alt="">
              <div>
                <h4>Cheesy pizza</h4>
                <p>Spicy testy pizza</p>
              </div>
            </td>
            <td>₹299</td>
            <td>
              <div class="qty-box">
                <button>-</button>
                <span>1</span>
                <button>+</button>
              </div>
            </td>
            <td>₹299</td>
            <td><button class="remove">X</button></td>
          </tr>
          <!-- pasta -->
           <tr>
            <td class="item">
              <img src="../img/red pasta.jpg" alt="">
              <div>
                <h4>Cheesy pasta </h4>
                <p>Cheesy Grilled pasta</p>
              </div>
            </td>
            <td>₹150</td>
            <td>
              <div class="qty-box">
                <button>-</button>
                <span>1</span>
                <button>+</button>
              </div>
            </td>
            <td>₹150</td>
            <td><button class="remove">X</button></td>
          </tr>
          <tr class="grand-total">
            <td colspan="3">Grand Total</td>
            <td>₹648</td>
            <td><button>Procced</button></td>
          </tr>
        </tbody>
      </table>
     </section>
</body>
</html>
